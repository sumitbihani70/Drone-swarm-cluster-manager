<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Team A Workflow</title>
    <link rel="stylesheet" href="card.css" />
  </head>
  <body>

    <main>
      <section>
        
        <div>
          <span>Left connector</span>
        </div>
        <div>
          <span>Right connector</span>
        </div>

      
        <header>
        
          <button type="button" aria-label="Workflow node">
            Workflow Icon
          </button>

          
          <h1>Team A</h1>

          
          <div>
            <span>Status: Ready</span>
            <button type="button" aria-label="More options">
              More
            </button>
          </div>
        </header>

    
        <div>
          
          <section>
            <header>
              <span>Upload Icon</span>
              <div>
                <h2>Upload Files</h2>
                <p>Upload mission files, data, images, etc.</p>
              </div>
            </header>

            
            <label class="drop-box" id="dropBox">
  <input type="file" id="fileInput" multiple />

  <span>Folder Icon</span>

  <strong>Drag &amp; drop files here</strong>
  <small>or click to browse</small>
</label>


            
            <div class="divider">
              <span>or</span>
            </div>

          
            <button type="button">
              <span>Upload Icon</span>
              Choose Files
            </button>
          </section>

          
          <section>
            <header>
              <span>Info Icon</span>
              <h2>Details</h2>
            </header>


            <article>
              <header>
                <span>Drones Icon</span>
                <div>
                  <h3>Drones</h3>
                  <p>Drone 1, Drone 2</p>
                </div>
              </header>


              <div>
                <div>
                  <span>Status</span>
                  <strong>Active</strong>
                </div>

                <div>
                  <span>Last Updated</span>
                  <time datetime="2025-05-19T11:30">19 May 2025, 11:30 AM</time>
                </div>
              </div>
            </article>
          </section>
        </div>
      </section>
    </main>
    <script src="style.js"></script>
  </body>
</html>
